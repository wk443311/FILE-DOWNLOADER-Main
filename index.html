                nav_home: "হোম",
                nav_history: "ইতিহাস",
                history_title: "ডাউনলোডস",
                history_subtitle: "আপনার আনলক করা ফাইলগুলি",
                empty_history: "এখনও কোনও ফাইল আনলক করা হয়নি।",
                screenshots: "স্ক্রিনশট",
                about_app: "এই ফাইল সম্পর্কে",
                reviews: "রেটিং এবং পর্যালোচনা",
                rate_this: "এই ফাইলটি রেট করুন",
                submit_review: "পর্যালোচনা জমা দিন",
                update_review: "পর্যালোচনা আপডেট করুন",
                no_reviews: "এখনও কোন পর্যালোচনা নেই। প্রথম হন!"
            }
        };

        function getText(key, params = {}) {
            let text = translations[currentLang][key] || key;
            for (const param in params) { text = text.replace(`{${param}}`, params[param]); }
            return text;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M+';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K+';
            return num || 0;
        }

        function getStarsHTML(rating) {
            let stars = '';
            for(let i=1; i<=5; i++) {
                if(i <= rating) stars += '<i class="fas fa-star text-yellow-400"></i>';
                else stars += '<i class="fas fa-star text-gray-300 dark:text-gray-600"></i>';
            }
            return stars;
        }

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('userLanguage', lang);
            document.querySelectorAll('[data-key]').forEach(el => { el.textContent = getText(el.getAttribute('data-key')); });
            document.querySelectorAll('[data-key-placeholder]').forEach(el => { el.placeholder = getText(el.getAttribute('data-key-placeholder')); });
            document.getElementById('submit-review-btn').textContent = getText('submit_review');
            renderFiles();
            renderHistory();
            if(currentFileId) {
                const file = allFiles.find(f => f.id === currentFileId);
                if(file) { updateDetailButtonState(file); renderReviews(file); }
            }
            document.getElementById('language-modal').classList.add('hidden');
        }

        // --- YouTube Style Skeleton Loader ---
        function showSkeletonLoader() {
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '';
            for(let i=0; i<10; i++) {
                grid.innerHTML += `
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col">
                        <div class="w-full aspect-video skeleton-box"></div>
                        <div class="p-3 md:p-4 flex flex-col flex-1 gap-3">
                            <div class="h-4 skeleton-box rounded w-3/4"></div>
                            <div class="space-y-2">
                                <div class="h-3 skeleton-box rounded w-full"></div>
                                <div class="h-3 skeleton-box rounded w-5/6"></div>
                            </div>
                            <div class="h-9 skeleton-box rounded-xl w-full mt-auto"></div>
                        </div>
                    </div>
                `;
            }
        }

        async function loadData() {
            // Show Shimmer Effect Before Fetching
            showSkeletonLoader();

            try {
                const s = await getDoc(doc(db, "settings", "general"));
                if(s.exists()) {
                    const data = s.data();
                    timerDuration = data.timerDuration || 10;
                    
                    if(data.appTitle) {
                        document.title = data.appTitle;
                        translations.en.main_title = data.appTitle;
                        translations.hi.main_title = data.appTitle;
                        translations.bn.main_title = data.appTitle;
                        document.querySelectorAll('.app-dynamic-title').forEach(el => el.textContent = data.appTitle);
                        applyLanguage(currentLang);
                    }
                    
                    if(data.themeColorFrom && data.themeColorTo) {
                        const header = document.querySelector('header');
                        if (header) {
                            header.classList.remove('from-indigo-600', 'to-purple-700', 'bg-gradient-to-br');
                            header.style.background = `linear-gradient(to bottom right, ${data.themeColorFrom}, ${data.themeColorTo})`;
                        }
                    }
                }
                const ads = await getDoc(doc(db, "settings", "ads"));
                if(ads.exists()) {
                    const d = ads.data();
                    if(d.adSlot1) document.getElementById('ad-container-1').innerHTML = d.adSlot1;
                    if(d.adSlot2) document.getElementById('ad-container-2').innerHTML = d.adSlot2;
                }
            } catch(e){ console.error("Error loading settings", e); }

            try {
                const sw = document.getElementById('slider-wrapper');
                const sTrack = document.getElementById('slider-track');
                const sDots = document.getElementById('slider-dots');
                const qS = query(collection(db, "sliders"), orderBy("createdAt", "desc"));
                const sS = await getDocs(qS);
                
                let slides = [];
                sS.forEach(doc => slides.push(doc.data()));

                if(slides.length > 0) {
                    sw.classList.remove('hidden');
                    sTrack.innerHTML = '';
                    sDots.innerHTML = '';

                    slides.forEach((s, idx) => {
                        let div = document.createElement('div');
                        div.className = `w-full h-full flex-shrink-0 ${s.linkUrl ? 'cursor-pointer' : ''}`;
                        if(s.linkUrl) div.onclick = () => window.open(s.linkUrl, '_blank');
                        div.innerHTML = `<img src="${s.imageUrl}" class="w-full h-full object-cover">`;
                        sTrack.appendChild(div);

                        if(slides.length > 1) {
                            let dot = document.createElement('div');
                            dot.className = `w-2 h-2 rounded-full ${idx === 0 ? 'bg-white' : 'bg-white/50'} transition-colors`;
                            dot.id = `dot-${idx}`;
                            sDots.appendChild(dot);
                        }
                    });

                    if(slides.length > 1) {
                        let currentSlide = 0;
                        if(slideInterval) clearInterval(slideInterval);
                        slideInterval = setInterval(() => {
                            currentSlide = (currentSlide + 1) % slides.length;
                            sTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
                            for(let i=0; i<slides.length; i++) {
                                document.getElementById(`dot-${i}`).className = `w-2 h-2 rounded-full ${i === currentSlide ? 'bg-white' : 'bg-white/50'} transition-colors`;
                            }
                        }, 3000);
                    }
                }
            } catch(e) { console.error("Error loading slider", e); }

            try {
                const q = collection(db, "files");
                const snaps = await getDocs(q);
                allFiles = [];
                snaps.forEach(d => {
                    const data = d.data();
                    allFiles.push({
                        id: d.id, 
                        downloads: data.downloads || 0,
                        reviews: data.reviews || [],
                        ...data
                    });
                });
                renderFiles();
                renderHistory();
            } catch(e) { console.error("Error loading files", e); }
        }

        // --- Render Home Grid ---
        function renderFiles() {
            const grid = document.getElementById('files-grid');
            grid.innerHTML = ''; // This will remove the skeletons
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allFiles.filter(f => (f.title || '').toLowerCase().includes(term));

            filtered.forEach(file => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col hover:shadow-lg transition-all duration-300';
                
                card.innerHTML = `
                    <div class="relative w-full aspect-video bg-gray-100 dark:bg-gray-700 cursor-pointer overflow-hidden group" onclick="window.openDetails('${file.id}')">
                        <img src="${file.thumbnailUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Thumbnail">
                        <div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[10px] px-2 py-1 rounded-md font-medium flex items-center gap-1 shadow">
                            <i class="fas fa-download"></i> ${formatNumber(file.downloads)}
                        </div>
                    </div>
                    <div class="p-3 md:p-4 flex flex-col flex-1">
                        <h3 class="font-bold text-sm md:text-base text-gray-800 dark:text-white line-clamp-1 cursor-pointer mb-2" onclick="window.openDetails('${file.id}')">${file.title}</h3>
                        <p class="text-[11px] md:text-xs text-gray-500 dark:text-gray-400 mb-3 line-clamp-2 flex-1">${file.description}</p>
                        <button onclick="window.openDetails('${file.id}')" class="w-full py-2 bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white dark:hover:text-white active:scale-95 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 border border-indigo-100 dark:border-indigo-800/50">
                            <i class="fas fa-download text-xs"></i> ${getText('download_default')}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Details Page ---
        window.openDetails = (id) => {
            currentFileId = id;
            const file = allFiles.find(f => f.id === id);
            if(!file) return;

            document.getElementById('detail-title').textContent = file.title;
            document.getElementById('detail-header-title').textContent = file.title;
            document.getElementById('detail-icon').src = file.thumbnailUrl;
            document.getElementById('detail-small-icon').src = file.thumbnailUrl;
            document.getElementById('detail-desc').textContent = file.description || 'No description available.';
            document.getElementById('detail-downloads').textContent = formatNumber(file.downloads);

            const scContainer = document.getElementById('detail-screenshots');
            scContainer.innerHTML = '';
            const images = file.screenshots && file.screenshots.length > 0 ? file.screenshots : [file.thumbnailUrl]; 
            
            images.forEach(imgUrl => {
                scContainer.innerHTML += `
                    <div class="snap-center shrink-0 cursor-pointer" onclick="window.openImageViewer('${imgUrl}')">
                        <img src="${imgUrl}" class="h-64 md:h-80 aspect-[9/16] rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm object-cover hover:shadow-md transition-shadow">
                    </div>
                `;
            });

            window.cancelEditReview(); 
            renderReviews(file);
            updateDetailButtonState(file);

            const detailsView = document.getElementById('details-view');
            detailsView.classList.remove('hidden');
            detailsView.classList.add('flex');
            detailsView.querySelector('.flex-1').scrollTop = 0;
        };

        window.closeDetails = () => {
            currentFileId = null;
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('details-view').classList.remove('flex');
        };

        window.openImageViewer = (src) => {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('image-viewer-img');
            img.src = src;
            viewer.classList.remove('hidden');
            viewer.classList.add('flex');
            setTimeout(() => {
                viewer.classList.replace('opacity-0', 'opacity-100');
                img.classList.replace('scale-95', 'scale-100');
            }, 10);
        };
        window.closeImageViewer = () => {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('image-viewer-img');
            viewer.classList.replace('opacity-100', 'opacity-0');
            img.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                viewer.classList.remove('flex');
                viewer.classList.add('hidden');
            }, 300);
        };
        document.getElementById('image-viewer').addEventListener('click', (e) => {
            if(e.target.id === 'image-viewer') window.closeImageViewer();
        });

        // --- Reviews Logic ---
        function renderReviews(file) {
            const list = document.getElementById('reviews-list');
            let avgLabel = document.getElementById('detail-rating-avg');
            list.innerHTML = '';
            
            let reviews = file.reviews || [];
            
            if(reviews.length === 0) {
                avgLabel.textContent = "0.0";
                list.innerHTML = `<div class="text-center text-gray-400 dark:text-gray-500 py-4"><i class="fas fa-comment-slash text-3xl mb-2"></i><p>${getText('no_reviews')}</p></div>`;
                return;
            }

            let sum = reviews.reduce((a, b) => a + b.rating, 0);
            avgLabel.textContent = (sum / reviews.length).toFixed(1);

            let sortedReviews = [...reviews].sort((a,b) => b.timestamp - a.timestamp);

            sortedReviews.forEach(rev => {
                const item = document.createElement('div');
                item.className = 'bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm relative group';
                const date = new Date(rev.timestamp).toLocaleDateString();
                const isOwner = rev.userId === tgUser.id;

                let actionHTML = '';
                if(isOwner) {
                    actionHTML = `
                        <div class="absolute top-4 right-4 flex gap-3 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                            <button onclick="window.editReviewForm('${rev.userId}')" class="text-indigo-500 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors"><i class="fas fa-edit"></i></button>
                            <button onclick="window.deleteReview('${rev.userId}')" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 transition-colors"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                }

                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2 pr-12">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center font-bold text-xs uppercase">
                                ${(rev.user || 'U').charAt(0)}
                            </div>
                            <div>
                                <h5 class="text-sm font-bold text-gray-800 dark:text-white">${rev.user} ${isOwner ? '<span class="text-[10px] bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-1.5 rounded ml-1">You</span>' : ''}</h5>
                                <div class="text-[10px] text-gray-400 dark:text-gray-500">${date}</div>
                            </div>
                        </div>
                        <div class="text-xs tracking-wider">${getStarsHTML(rev.rating)}</div>
                    </div>
                    <p class="text-gray-600 dark:text-gray-300 text-sm mt-2">${rev.text}</p>
                    ${actionHTML}
                `;
                list.appendChild(item);
            });
        }

        function updateStarUI() {
            document.querySelectorAll('.star-btn').forEach(btn => {
                const val = parseInt(btn.getAttribute('data-val'));
                if(val <= userRating) {
                    btn.classList.remove('text-gray-300', 'dark:text-gray-600');
                    btn.classList.add('text-yellow-400');
                } else {
                    btn.classList.add('text-gray-300', 'dark:text-gray-600');
                    btn.classList.remove('text-yellow-400');
                }
            });
        }

        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                userRating = parseInt(btn.getAttribute('data-val'));
                updateStarUI();
            });
        });

        window.editReviewForm = (userId) => {
            const file = allFiles.find(f => f.id === currentFileId);
            const myReview = file.reviews.find(r => r.userId === userId);
            if(myReview) {
                userRating = myReview.rating;
                updateStarUI();
                document.getElementById('review-text').value = myReview.text;
                document.getElementById('submit-review-btn').textContent = getText('update_review');
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                document.getElementById('star-rating-container').scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        };

        window.cancelEditReview = () => {
            userRating = 0;
            updateStarUI();
            document.getElementById('review-text').value = '';
            document.getElementById('submit-review-btn').textContent = getText('submit_review');
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        window.deleteReview = async (userId) => {
            if(!confirm("Are you sure you want to delete your review?")) return;
            
            const file = allFiles.find(f => f.id === currentFileId);
            if(!file) return;

            const updatedReviews = file.reviews.filter(r => r.userId !== userId);
            file.reviews = updatedReviews;
            renderReviews(file);
            window.cancelEditReview();
            showToast("Review deleted");
            
            try {
                const fileRef = doc(db, "files", currentFileId);
                await updateDoc(fileRef, { reviews: updatedReviews });
            } catch (error) {
                console.error("Error deleting review from DB:", error);
            }
        };

        document.getElementById('submit-review-btn').addEventListener('click', async () => {
            if(userRating === 0) return showToast("Please select a star rating");
            const text = document.getElementById('review-text').value.trim();
            if(!text) return showToast("Please write a review");

            const file = allFiles.find(f => f.id === currentFileId);
            let updatedReviews = [...(file.reviews || [])];
            
            const existingIdx = updatedReviews.findIndex(r => r.userId === tgUser.id);
            const newReview = {
                userId: tgUser.id,
                user: tgUser.name,
                rating: userRating,
                text: text,
                timestamp: Date.now()
            };

            if(existingIdx >= 0) {
                updatedReviews[existingIdx] = newReview; 
            } else {
                updatedReviews.push(newReview);
            }

            file.reviews = updatedReviews;
            renderReviews(file);
            window.cancelEditReview();
            showToast("Review saved successfully!");

            try {
                const fileRef = doc(db, "files", currentFileId);
                await updateDoc(fileRef, { reviews: updatedReviews });
            } catch (error) {
                console.error("Error saving review to DB:", error);
            }
        });

        // --- Download / Ad Logic ---
        function updateDetailButtonState(file) {
            const req = parseInt(file.requiredAds) || 5;
            const count = parseInt(localStorage.getItem(`adCount_${file.id}`)) || 0;
            const isUnlocked = count >= req;
            const actionContainer = document.getElementById('detail-actions');

            if(isUnlocked) {
                saveToHistory(file.id);
                actionContainer.innerHTML = `
                    <a href="${file.downloadUrl}" target="_blank" class="flex-1 py-3.5 bg-green-600 hover:bg-green-700 text-white text-center rounded-xl font-bold shadow-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-download"></i> ${file.btnName1 || getText('download_default')}
                    </a>
                    ${file.downloadUrl2 ? `<a href="${file.downloadUrl2}" target="_blank" class="flex-1 py-3.5 bg-teal-600 hover:bg-teal-700 text-white text-center rounded-xl font-bold shadow-lg transition-colors flex items-center justify-center gap-2"><i class="fas fa-link"></i> ${file.btnName2 || 'Link 2'}</a>` : ''}
                `;
            } else {
                actionContainer.innerHTML = `
                    <button id="unlock-action-btn" onclick="window.unlockFile('${file.id}', ${req})" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-lock"></i> 
                        <span>${getText('unlock_btn')} (${count}/${req})</span>
                    </button>
                `;
            }
        }

        window.unlockFile = async (id, req) => {
            const btn = document.getElementById('unlock-action-btn');
            if(!btn || btn.disabled) return;
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${getText('loading_ad')}</span>`;

            try {
                if (window.Adsgram) {
                    const AdController = window.Adsgram.init({ blockId: "20214" });
                    await AdController.show();
                } else {
                    await new Promise(r => setTimeout(r, 1500)); 
                }

                let count = parseInt(localStorage.getItem(`adCount_${id}`)) || 0;
                count++;
                localStorage.setItem(`adCount_${id}`, count);

                if(count >= req) {
                    showToast(getText('unlocked_msg'));
                    saveToHistory(id);
                    
                    try {
                        const fileRef = doc(db, "files", id);
                        await updateDoc(fileRef, { downloads: increment(1) });
                    } catch(e) { console.error("Error updating download count:", e) }

                    const file = allFiles.find(f => f.id === id);
                    if(file) file.downloads++; 
                    
                    updateDetailButtonState(file);
                    document.getElementById('detail-downloads').textContent = formatNumber(file.downloads);
                    renderFiles(); 
                    renderHistory();
                } else {
                    showToast(getText('progress_text', {count, req}));
                    let cd = timerDuration;
                    const int = setInterval(() => {
                        btn.innerHTML = `<i class="fas fa-clock"></i> <span>${getText('wait_text', {cd})}</span>`;
                        cd--;
                        if(cd < 0) {
                            clearInterval(int);
                            btn.disabled = false;
                            btn.innerHTML = `<i class="fas fa-lock"></i> <span>${getText('unlock_btn')} (${count}/${req})</span>`;
                        }
                    }, 1000);
                }
            } catch(e) {
                console.error("Ad error: ", e);
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span>${getText('ad_failed')}</span>`;
            }
        };

        // --- History Logic ---
        function saveToHistory(fileId) {
            let history = JSON.parse(localStorage.getItem('downloadHistory') || '[]');
            if(!history.includes(fileId)) {
                history.push(fileId);
                localStorage.setItem('downloadHistory', JSON.stringify(history));
            }
        }

        function renderHistory() {
            const historyList = document.getElementById('history-list');
            const emptyState = document.getElementById('empty-history');
            let historyIds = JSON.parse(localStorage.getItem('downloadHistory') || '[]');
            
            historyIds = historyIds.filter(id => {
                const file = allFiles.find(f => f.id === id);
                if(!file) return false;
                const req = parseInt(file.requiredAds) || 5;
                const count = parseInt(localStorage.getItem(`adCount_${id}`)) || 0;
                return count >= req;
            });

            historyList.innerHTML = '';

            if(historyIds.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                historyIds.forEach(id => {
                    const file = allFiles.find(f => f.id === id);
                    if(file) {
                        const item = document.createElement('div');
                        item.className = 'bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-transparent dark:border-gray-700 flex items-center gap-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors';
                        item.onclick = () => window.openDetails(file.id);
                        
                        item.innerHTML = `
                            <img src="${file.thumbnailUrl}" class="w-16 h-16 rounded-xl object-cover shadow-sm bg-gray-100 dark:bg-gray-700">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800 dark:text-white line-clamp-1">${file.title}</h3>
                                <p class="text-xs text-green-600 dark:text-green-400 font-semibold mt-1"><i class="fas fa-check-circle"></i> Unlocked</p>
                            </div>
                            <button class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 w-10 h-10 rounded-full flex items-center justify-center">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        `;
                        historyList.appendChild(item);
                    }
                });
            }
        }

        window.switchTab = (tab) => {
            const homeView = document.getElementById('home-view');
            const historyView = document.getElementById('history-view');
            const navHome = document.getElementById('nav-home');
            const navHistory = document.getElementById('nav-history');

            if(tab === 'home') {
                homeView.classList.remove('hidden'); historyView.classList.add('hidden');
                navHome.classList.replace('text-gray-400', 'text-indigo-600'); navHome.classList.replace('dark:text-gray-500', 'dark:text-indigo-400');
                navHistory.classList.replace('text-indigo-600', 'text-gray-400'); navHistory.classList.replace('dark:text-indigo-400', 'dark:text-gray-500');
            } else if(tab === 'history') {
                homeView.classList.add('hidden'); historyView.classList.remove('hidden');
                navHistory.classList.replace('text-gray-400', 'text-indigo-600'); navHistory.classList.replace('dark:text-gray-500', 'dark:text-indigo-400');
                navHome.classList.replace('text-indigo-600', 'text-gray-400'); navHome.classList.replace('dark:text-indigo-400', 'dark:text-gray-500');
                renderHistory();
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            t.classList.remove('-translate-y-24', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                t.classList.add('-translate-y-24', 'opacity-0');
                t.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        document.getElementById('searchInput').addEventListener('input', renderFiles);
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLanguage(btn.dataset.lang)));
        document.getElementById('searchInput').addEventListener('focus', () => window.scrollTo({top: 0, behavior: 'smooth'}));

        async function initializeAppWithAuth() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.warn("Anonymous auth failed (Check Firebase auth settings):", error);
            }
            loadData();
        }

        const savedLang = localStorage.getItem('userLanguage');
        if(savedLang) applyLanguage(savedLang);
        else document.getElementById('language-modal').classList.remove('hidden');

        initializeAppWithAuth();
    </script>
</body>
</html>
